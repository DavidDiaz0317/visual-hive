name: Visual Hive Scheduled

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-hive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: DavidDiaz0317/visual-hive/actions/run@main
        with:
          command: pipeline
          arguments: --mode schedule --ci --enforce-mutation --github-step-summary
      # Optional trusted Argos upload. Keep disabled until ARGOS_TOKEN is configured,
      # costPolicy allows this run mode, and maintainers approve hosted review usage.
      # Visual Hive remains the verdict authority even when Argos is enabled.
      # - uses: DavidDiaz0317/visual-hive/actions/run@main
      #   with:
      #     command: providers
      #     arguments: upload --provider argos --fail-on-provider-failure
      #   env:
      #     ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
      # This scheduled workflow may use protected secrets. A separate trusted
      # workflow_run workflow can create issues from .visual-hive/issue.md.
      # For stricter supply-chain hardening, pin actions by SHA instead of tags.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-hive
          path: .visual-hive
          include-hidden-files: true
