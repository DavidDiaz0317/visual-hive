name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:e2e
      - run: npm run demo:ci
      - run: npm run smoke:ui:browser
      - run: npm run smoke:cli
      - run: npm run smoke:consumer
      - run: npm run demo:baselines
        if: always()
      - run: npm run demo:workflows
        if: always()
      - run: npm run demo:risk
        if: always()
      - run: npm run demo:security
        if: always()
      - run: npm run demo:costs
        if: always()
      - run: npm run demo:readiness
        if: always()
      - run: npm run demo:triage
        if: always()
      - run: node packages/cli/dist/index.js report --config examples/demo-react-app/visual-hive.config.yaml --github-step-summary
        if: always()
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: visual-hive-demo
          path: examples/demo-react-app/.visual-hive
          include-hidden-files: true
