name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:ci
      - run: npm run demo:baselines
        if: always()
      - run: npm run demo:workflows
        if: always()
      - run: npm run demo:triage
        if: always()
      - run: node packages/cli/dist/index.js report --config examples/demo-react-app/visual-hive.config.yaml --github-step-summary
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-hive-demo
          path: examples/demo-react-app/.visual-hive
          include-hidden-files: true
