name: Example Visual Hive Scheduled

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-hive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:ci
      - run: npm run demo:baselines
        if: always()
      - run: npm run demo:mutate
      - run: npm run demo:workflows
        if: always()
      - run: npm run demo:providers
        if: always()
      # Optional trusted Argos upload. Keep disabled until ARGOS_TOKEN is configured
      # and costPolicy allows this scheduled/manual lane.
      # - run: node packages/cli/dist/index.js providers upload --provider argos --config examples/demo-react-app/visual-hive.config.yaml --fail-on-provider-failure
      #   if: always()
      #   env:
      #     ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
      - run: npm run demo:risk
        if: always()
      - run: npm run demo:security
        if: always()
      - run: npm run demo:costs
        if: always()
      - run: npm run demo:readiness
        if: always()
      - run: npm run demo:triage
        if: always()
      - run: node packages/cli/dist/index.js report --config examples/demo-react-app/visual-hive.config.yaml --github-step-summary
        if: always()
      - run: npm run demo:artifacts
        if: always()
      # A trusted workflow_run workflow can create an issue from .visual-hive/issues.json.
      # For stricter supply-chain hardening, pin actions by SHA instead of tags.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-hive
          path: examples/demo-react-app/.visual-hive
          include-hidden-files: true
