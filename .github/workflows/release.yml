name: Release Visual Hive bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:bundle
      - run: npm run smoke:release
      - name: Package immutable bundle
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          archive="visual-hive-${version}.tar.gz"
          tar -C dist -czf "dist/${archive}" "visual-hive-${version}"
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"
      - name: Sign build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/visual-hive-*.tar.gz
            dist/visual-hive-*.tar.gz.sha256
      - name: Retain release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-hive-release-${{ github.sha }}
          path: |
            dist/visual-hive-*.tar.gz
            dist/visual-hive-*.tar.gz.sha256
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/visual-hive-*.tar.gz dist/visual-hive-*.tar.gz.sha256 --verify-tag --generate-notes
