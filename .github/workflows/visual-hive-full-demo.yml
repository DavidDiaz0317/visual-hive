name: Visual Hive Full Demo

on:
  workflow_dispatch:
  schedule:
    - cron: "27 7 * * *"

permissions:
  contents: read

jobs:
  full-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:full-run
      - run: node packages/cli/dist/index.js report --config examples/demo-react-app/visual-hive.config.yaml --github-step-summary
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-hive-full-demo
          path: examples/demo-react-app/.visual-hive
          include-hidden-files: true
