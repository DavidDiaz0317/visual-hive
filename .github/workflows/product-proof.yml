name: Product Proof

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run demo:full-run
      - run: npm run demo:graph:search
      - run: npm run demo:graph:impact
      - run: npm run demo:issues
      - run: npm run demo:issue-publish
      - run: npm run demo:agent-issue-run
      - run: npm run demo:mcp
      - run: npm run demo:mcp:smoke
      - run: npm run github-app:smoke:server
      - run: npm run github-app:smoke:artifacts
      - run: npm run github-app:smoke:live
      - run: npm run smoke:ui
      - run: npm run smoke:ui:browser
      - run: npm test -w @visual-hive/github-app
      - run: npm run demo:baselines
        if: always()
      - run: node packages/cli/dist/index.js report --config examples/demo-react-app/visual-hive.config.yaml --github-step-summary
        if: always()
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: visual-hive-product-proof
          path: examples/demo-react-app/.visual-hive
          include-hidden-files: true
