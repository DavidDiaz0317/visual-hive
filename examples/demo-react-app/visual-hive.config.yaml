project:
  name: demo-react-app
  type: react-vite
  defaultBranch: main

targets:
  localPreview:
    kind: command
    install: "npm ci"
    build: "npm run build"
    serve: "npm run preview -- --port 4173"
    url: "http://127.0.0.1:4173"
    prSafe: true
    cost: cheap

  unsafeHosted:
    kind: protected
    url: "https://example.com"
    prSafe: false
    schedule: "0 */4 * * *"
    cost: cheap
    requiresSecrets:
      - DEMO_PROTECTED_TOKEN

contracts:
  - id: hosted-demo-never-login
    description: Public/demo target should never expose login controls.
    target: localPreview
    severity: critical
    runOn:
      pullRequest: true
      schedule: true
    waitFor:
      - selector: "[data-testid='dashboard-page']"
        state: visible
        timeoutMs: 5000
    failOnConsoleError: true
    expectedConsoleErrors: []
    selectors:
      mustExist:
        - "[data-testid='dashboard-page']"
        - "[data-testid='critical-action-button']"
        - "[data-testid='demo-badge']"
      mustNotExist:
        - "[data-testid='login-page']"
        - "[data-testid='github-login-button']"
        - "[data-testid='protected-route']"
        - "[data-testid='loading-state']"
      textMustExist:
        - "Demo metrics loaded"
        - "Run protected check"
      textMustNotExist:
        - "Continue with GitHub"
        - "Protected route bypass"
        - "Loading dashboard data"
    screenshots:
      - name: dashboard
        route: "/"
        viewport: desktop

  - id: dashboard-visual-stability
    description: Dashboard should render stable visual layout.
    target: localPreview
    severity: high
    runOn:
      pullRequest: true
      schedule: true
    waitFor:
      - selector: "[data-testid='dashboard-card']"
        state: visible
        timeoutMs: 5000
    selectors:
      mustExist:
        - "[data-testid='dashboard-page']"
        - "[data-testid='dashboard-card']"
    screenshots:
      - name: dashboard-desktop
        route: "/"
        viewport: desktop
      - name: dashboard-mobile
        route: "/"
        viewport: mobile

  - id: live-cluster-protected-lane
    description: Protected scheduled target illustrates unsafe target filtering.
    target: unsafeHosted
    severity: high
    runOn:
      pullRequest: true
      schedule: true
    selectors:
      mustExist:
        - "body"

viewports:
  desktop:
    width: 1440
    height: 900
  tablet:
    width: 768
    height: 1024
  mobile:
    width: 390
    height: 844

visual:
  maxDiffPixelRatio: 0.01
  updateSnapshots: false
  failOnMissingBaselineInCI: true
  snapshotDir: ".visual-hive/snapshots"
  artifactDir: ".visual-hive/artifacts"

selection:
  changedFiles:
    - pattern: "src/components/auth/**"
      contracts:
        - hosted-demo-never-login
      risk: critical
    - pattern: "src/**"
      contracts:
        - dashboard-visual-stability
      risk: medium

mutation:
  enabled: true
  runOn:
    schedule: true
  minScore: 0.7
  operators:
    - id: hide-critical-button
      contracts:
        - hosted-demo-never-login
    - id: force-login-on-demo
      contracts:
        - hosted-demo-never-login
    - id: remove-demo-badge
      contracts:
        - hosted-demo-never-login
    - id: api-500
      contracts:
        - hosted-demo-never-login
    - id: empty-data
      contracts:
        - dashboard-visual-stability
    - id: mobile-overflow
      contracts:
        - dashboard-visual-stability
    - id: route-guard-bypass
      contracts:
        - hosted-demo-never-login
    - hidden-error-banner
    - broken-image
    - id: removed-accessible-name
      contracts:
        - hosted-demo-never-login
    - id: theme-token-drift
      contracts:
        - dashboard-visual-stability
    - id: stale-loading-state
      contracts:
        - hosted-demo-never-login

ai:
  enabled: false
  provider: none
  model: offline-heuristics
  neverSoleOracle: true
  createIssuePrompt: true
  maxDailyRuns: 5
  maxPromptTokens: 50000
  maxEstimatedCostUsd: 0

github:
  enabled: true
  issueLabels:
    - visual-hive
    - test-failure
  commentMarker: "<!-- visual-hive-report -->"
