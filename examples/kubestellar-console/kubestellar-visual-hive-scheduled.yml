name: KubeStellar Visual Hive Scheduled

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-hive:
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      KC_AGENT_TOKEN: ${{ secrets.KC_AGENT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: DavidDiaz0317/visual-hive/actions/run@main
        with:
          command: pipeline
          arguments: --config examples/kubestellar-console/visual-hive.config.yaml --mode schedule --ci --enforce-mutation --github-step-summary
      # Optional trusted Argos upload. Keep disabled until ARGOS_TOKEN is configured,
      # costPolicy allows this run mode, and maintainers approve hosted review usage.
      # Playwright remains the pass/fail oracle even when Argos is enabled.
      # - uses: DavidDiaz0317/visual-hive/actions/run@main
      #   with:
      #     command: providers
      #     arguments: upload --config examples/kubestellar-console/visual-hive.config.yaml --provider argos --fail-on-provider-failure
      #   env:
      #     ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
      # A trusted workflow_run workflow can create issues from uploaded artifacts.
      # For stricter supply-chain hardening, pin actions by SHA instead of tags.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kubestellar-visual-hive
          path: .visual-hive
          include-hidden-files: true
