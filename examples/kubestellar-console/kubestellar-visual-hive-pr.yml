name: KubeStellar Visual Hive PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  visual-hive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx visual-hive plan --config examples/kubestellar-console/visual-hive.config.yaml --mode pr --base origin/main --ci
      - run: npx visual-hive run --config examples/kubestellar-console/visual-hive.config.yaml --ci
      - run: npx visual-hive baselines list --config examples/kubestellar-console/visual-hive.config.yaml --write
        if: always()
      - run: npx visual-hive coverage --config examples/kubestellar-console/visual-hive.config.yaml --mode pr --base origin/main
        if: always()
      - run: npx visual-hive improve-coverage --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive targets --config examples/kubestellar-console/visual-hive.config.yaml --mode pr --base origin/main
        if: always()
      - run: npx visual-hive contracts --config examples/kubestellar-console/visual-hive.config.yaml --mode pr --base origin/main
        if: always()
      - run: npx visual-hive flows --config examples/kubestellar-console/visual-hive.config.yaml --mode pr --base origin/main
        if: always()
      - run: npx visual-hive schedules --config examples/kubestellar-console/visual-hive.config.yaml --base origin/main
        if: always()
      - run: npx visual-hive workflows --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive providers --config examples/kubestellar-console/visual-hive.config.yaml --mock-results
        if: always()
      - run: npx visual-hive risk --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive security --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive costs --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive readiness --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive triage --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive llm --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      - run: npx visual-hive report --config examples/kubestellar-console/visual-hive.config.yaml --github-step-summary
        if: always()
      - run: npx visual-hive artifacts --config examples/kubestellar-console/visual-hive.config.yaml
        if: always()
      # Do not create issues from untrusted PR execution. Upload artifacts and let
      # a trusted workflow_run workflow consume them if issue creation is needed.
      # For stricter supply-chain hardening, pin actions by SHA instead of tags.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kubestellar-visual-hive
          path: .visual-hive
          include-hidden-files: true
