project:
  name: kubestellar-console
  type: dashboard
  defaultBranch: main
  setupProfile: complex-app

targets:
  hostedDemo:
    kind: url
    url: "https://console.kubestellar.io"
    prSafe: true
    cost: cheap
    schedule: "0 */4 * * *"

  localPreview:
    kind: command
    install: "cd web && npm ci"
    build: "cd web && npm run build"
    serve: "cd web && npm run preview -- --port 4173 --strictPort"
    url: "http://127.0.0.1:4173"
    prSafe: true
    cost: cheap

  fakeOAuthFullstack:
    kind: commandGroup
    setup:
      - "cd test/fake-oauth && npm ci"
      - "cd backend && npm ci && npm run build"
      - "cd web && npm ci && npm run build"
    services:
      - name: fake-oauth
        command: "cd test/fake-oauth && npm run start -- --port 9090"
        url: "http://127.0.0.1:9090/healthz"
        readinessTimeoutMs: 30000
      - name: backend
        command: "cd backend && FAKE_OAUTH_URL=http://127.0.0.1:9090 npm run start:test -- --port 8080"
        url: "http://127.0.0.1:8080/healthz"
        readinessTimeoutMs: 45000
      - name: frontend
        command: "cd web && VITE_API_URL=http://127.0.0.1:8080 npm run preview -- --port 4173 --strictPort"
        url: "http://127.0.0.1:4173"
        readinessTimeoutMs: 45000
    teardown:
      - "node scripts/cleanup-test-fixtures.js"
    url: "http://127.0.0.1:4173"
    prSafe: true
    cost: medium

  liveCluster:
    kind: protected
    url: "https://console.kubestellar.io"
    prSafe: false
    schedule: "0 6 * * *"
    cost: expensive
    requiresSecrets:
      - KUBECONFIG
      - KC_AGENT_TOKEN

contracts:
  - id: hosted-demo-never-login
    description: Hosted public demo should never expose login controls.
    target: hostedDemo
    severity: critical
    runOn:
      pullRequest: true
      schedule: true
    waitFor:
      - selector: "[data-testid='dashboard-page']"
        state: visible
        timeoutMs: 10000
    selectors:
      mustExist:
        - "[data-testid='dashboard-page']"
      mustNotExist:
        - "[data-testid='login-page']"
        - "[data-testid='github-login-button']"
    screenshots:
      - name: hosted-dashboard
        route: "/"
        viewport: desktop

  - id: local-login-visible-when-oauth-enabled
    description: Local OAuth-enabled preview should show login controls.
    target: localPreview
    severity: high
    runOn:
      pullRequest: true
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='login-page']"
        - "[data-testid='github-login-button']"
    screenshots:
      - name: local-login
        route: "/login"
        viewport: desktop

  - id: fake-oauth-login-dashboard
    description: Fake OAuth flow should complete and render the dashboard without real credentials.
    target: fakeOAuthFullstack
    severity: critical
    runOn:
      pullRequest: true
      schedule: true
    waitFor:
      - selector: "[data-testid='dashboard-page']"
        state: visible
        timeoutMs: 15000
    selectors:
      mustExist:
        - "[data-testid='dashboard-page']"
        - "[data-testid='user-menu']"
      mustNotExist:
        - "[data-testid='github-login-button']"
    screenshots:
      - name: fake-oauth-dashboard
        route: "/auth/fake/callback"
        viewport: desktop

  - id: dashboard-visual-stability
    description: Main dashboard layout should remain stable.
    target: localPreview
    severity: high
    runOn:
      pullRequest: true
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='dashboard-page']"
    screenshots:
      - name: dashboard-desktop
        route: "/"
        viewport: desktop
      - name: dashboard-mobile
        route: "/"
        viewport: mobile

  - id: clusters-page-visual-stability
    description: Cluster page should render stable cards and tables.
    target: fakeOAuthFullstack
    severity: high
    runOn:
      pullRequest: true
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='clusters-page']"
        - "[data-testid='cluster-card']"
    screenshots:
      - name: clusters-desktop
        route: "/clusters"
        viewport: desktop

  - id: settings-page-visual-stability
    description: Settings page should render stable navigation and forms.
    target: localPreview
    severity: medium
    runOn:
      pullRequest: true
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='settings-page']"
    screenshots:
      - name: settings-desktop
        route: "/settings"
        viewport: desktop

  - id: card-demo-badge-contract
    description: Demo cards should remain clearly marked.
    target: hostedDemo
    severity: high
    runOn:
      pullRequest: true
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='demo-badge']"

  - id: mobile-no-horizontal-overflow
    description: Mobile dashboard should not introduce horizontal overflow.
    target: localPreview
    severity: medium
    runOn:
      pullRequest: true
      schedule: true
    screenshots:
      - name: dashboard-mobile-overflow
        route: "/"
        viewport: mobile

  - id: live-cluster-picker-renders
    description: Protected live cluster picker should render in scheduled runs.
    target: liveCluster
    severity: critical
    runOn:
      pullRequest: false
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='cluster-picker']"
    screenshots:
      - name: live-cluster-picker
        route: "/clusters"
        viewport: desktop
        mask:
          - "[data-testid='cluster-secret']"

  - id: live-workloads-renders
    description: Protected live workloads page should render in scheduled runs.
    target: liveCluster
    severity: critical
    runOn:
      pullRequest: false
      schedule: true
    selectors:
      mustExist:
        - "[data-testid='workloads-page']"
        - "[data-testid='workload-row']"
    screenshots:
      - name: live-workloads
        route: "/workloads"
        viewport: desktop
        mask:
          - "[data-testid='cluster-secret']"

viewports:
  desktop:
    width: 1440
    height: 900
  tablet:
    width: 768
    height: 1024
  mobile:
    width: 390
    height: 844

visual:
  maxDiffPixelRatio: 0.01
  updateSnapshots: false
  failOnMissingBaselineInCI: true
  snapshotDir: ".visual-hive/snapshots"
  artifactDir: ".visual-hive/artifacts"

selection:
  ignoreChangedFiles:
    - pattern: "docs/**"
      reason: "documentation-only change"
    - pattern: "**/*.md"
      reason: "markdown-only change"
    - pattern: "*.md"
      reason: "root markdown-only change"
  changedFiles:
    - pattern: "docs/**"
      contracts: []
      risk: low
    - pattern: "web/src/**/auth/**"
      contracts:
        - hosted-demo-never-login
        - fake-oauth-login-dashboard
        - local-login-visible-when-oauth-enabled
      risk: critical
    - pattern: "web/src/**/dashboard/**"
      contracts:
        - dashboard-visual-stability
        - mobile-no-horizontal-overflow
      risk: high
    - pattern: "web/src/**/cards/**"
      contracts:
        - card-demo-badge-contract
        - dashboard-visual-stability
      risk: high
    - pattern: "backend/**"
      contracts:
        - clusters-page-visual-stability
        - fake-oauth-login-dashboard
      risk: high
    - pattern: "pkg/kc-agent/**"
      contracts:
        - live-cluster-picker-renders
        - live-workloads-renders
      risk: critical

mutation:
  enabled: true
  runOn:
    schedule: true
  minScore: 0.75
  operators:
    - id: force-login-on-demo
      contracts:
        - hosted-demo-never-login
    - id: remove-demo-badge
      contracts:
        - card-demo-badge-contract
    - id: mobile-overflow
      contracts:
        - mobile-no-horizontal-overflow
    - api-500
    - empty-data
    - id: route-guard-bypass
      contracts:
        - hosted-demo-never-login
        - fake-oauth-login-dashboard
    - hidden-error-banner
    - broken-image
    - id: removed-accessible-name
      contracts:
        - local-login-visible-when-oauth-enabled
        - fake-oauth-login-dashboard
    - id: theme-token-drift
      contracts:
        - dashboard-visual-stability
        - clusters-page-visual-stability
        - settings-page-visual-stability
    - id: stale-loading-state
      contracts:
        - dashboard-visual-stability
        - live-workloads-renders

ai:
  enabled: false
  provider: none
  model: offline-heuristics
  neverSoleOracle: true
  createIssuePrompt: true
  maxDailyRuns: 5
  maxPromptTokens: 50000
  maxEstimatedCostUsd: 0

providers:
  argos:
    enabled: false
    mode: external
    requiredEnv:
      - ARGOS_TOKEN
    upload:
      buildName: "kubestellar-console-scheduled"
      includeActualScreenshots: true
      includeDiffScreenshots: true
      includeTextArtifacts: true
      extraFiles:
        - ".visual-hive/report.json"
        - ".visual-hive/mutation-report.json"

integrations:
  hive:
    enabled: false
    mode: advisory
    labels:
      - visual-hive
      - hive/quality
      - ai-ready
      - kubestellar-console
    beadApi:
      tokenEnv: HIVE_DASHBOARD_TOKEN
      agent: quality

costPolicy:
  maxExternalScreenshotsPerRun: 40
  maxMonthlyExternalScreenshots: 5000
  externalUpload:
    pullRequest: false
    schedule: true
    manual: true
    canary: false
    mutation: false
    full: true
    onFailureOnly: true
    criticalContractsOnly: true

github:
  enabled: true
  issueLabels:
    - visual-hive
    - kubestellar-console
    - test-failure
  commentMarker: "<!-- visual-hive-report -->"
